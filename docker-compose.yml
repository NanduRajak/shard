services:
  steel:
    image: ghcr.io/steel-dev/steel-browser:latest
    container_name: shard-steel
    ports:
      - "3001:3000"
      - "9223:9223"
    volumes:
      - ./.docker/steel-cache:/app/.cache
    restart: unless-stopped

  inngest:
    image: inngest/inngest:v1.17.5
    container_name: shard-inngest
    command: inngest dev -u http://host.docker.internal:3000/api/inngest
    ports:
      - "8288:8288"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
